home:
  title: dsVertClient
  description: Privacy-Preserving Analysis of Vertically Partitioned Data
  sidebar:
    structure: [links, authors, license]

reference:
  - title: Record alignment
    desc: Privacy-preserving record alignment using ECDH-PSI
    contents:
      - ds.psiAlign
      - ds.isPsiAligned
      - ds.getIdentityPks

  - title: Correlation, PCA, descriptive
    desc: Distributed second-order summaries
    contents:
      - ds.vertCor
      - ds.vertPCA
      - ds.vertDesc
      - ds.vertChisq
      - ds.vertChisqCross
      - ds.vertFisher

  - title: Generalised linear models (GLM)
    desc: K=2 / K=3 federated GLM fits via Ring63 Beaver MPC
    contents:
      - ds.vertGLM
      - ds.vertConfint
      - ds.vertContrast
      - ds.vertWald
      - ds.vertLR

  - title: Survival
    desc: Cox proportional-hazards (K=2 OT-Beaver) and K=3 Poisson trick
    contents:
      - ds.vertCox
      - ds.vertCox.k3
      - ds.vertCoxDiscreteNonDisclosive

  - title: Negative-binomial
    desc: NB regression with iid-mu / MoM / full-reg theta pivots
    contents:
      - ds.vertNB
      - ds.vertNBMoMTheta
      - ds.vertNBFullRegTheta

  - title: Multinomial / ordinal
    desc: OVR + softmax-anchor (warm) and joint Newton (Tutz / Bohning)
    contents:
      - ds.vertMultinom
      - ds.vertMultinomJoint
      - ds.vertMultinomJointNewton
      - ds.vertOrdinal
      - ds.vertOrdinalJointNewton

  - title: Mixed models / longitudinal
    desc: REML LMM (K=2 / K=3), GEE sandwich, binomial Laplace GLMM
    contents:
      - ds.vertLMM
      - ds.vertLMM.k3
      - ds.vertGEE
      - ds.vertGLMM

  - title: Causal inference / robustness
    desc: Inverse-probability-weighting and multiple-imputation pooling
    contents:
      - ds.vertIPW
      - ds.vertMI

  - title: LASSO / penalised regression
    desc: Proximal-gradient / FISTA on the federated GLM normal-equations
    contents:
      - ds.vertLASSO
      - ds.vertLASSO1Step
      - ds.vertLASSOIter
      - ds.vertLASSOCV
      - ds.vertLASSOProximal

  - title: Utility / printers
    desc: Helper and administrative methods
    contents:
      - coef.ds.glm
      - print.ds.cor
      - print.ds.pca
      - print.ds.glm
      - summary.ds.glm

  - title: Internal protocol implementations
    contents:
      - chunk-utils
      - k2-beaver-lbfgs-client
      - k3-ring63-dcf-loop

articles:
  - title: Federated estimators -- one vignette per method
    desc: |
      Each article exercises a single dsVert estimator end-to-end on a
      canonical small public dataset, against the analyst's go-to
      centralised R reference (`stats::glm`, `survival::coxph`,
      `nlme::lme`, `MASS::glm.nb`, `MASS::polr`, `nnet::multinom`,
      `lme4::glmer`, `geepack::geeglm`, weighted glm, lm/glmnet),
      using the in-process DSLite multi-server harness. The five-section
      template (context + math + non-disclosure + partition table | data
      preparation + DSLite stand-up + PSI alignment | federated fit |
      centralised reference | comparison + verdict) is identical across
      methods so the reader can compare estimators by skimming.
    contents:
      - methods/glm
      - methods/nb
      - methods/cox_k2
      - methods/cox_k3
      - methods/lmm_k2
      - methods/lmm_k3
      - methods/gee
      - methods/glmm
      - methods/ord_joint
      - methods/ord_warm
      - methods/mnl_joint
      - methods/mnl_warm
      - methods/ipw
      - methods/lasso

authors:
